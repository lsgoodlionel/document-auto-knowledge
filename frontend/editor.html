<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>知识网络编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="editor-shell">
      <section class="editor-topbar panel">
        <div>
          <p class="eyebrow">KNOWLEDGE NETWORK</p>
          <h1 class="editor-title">目录知识网络编辑器</h1>
          <p id="editor-subtitle" class="intro compact">
            点击任意节点查看上下级关系，并在右侧维护标题与文本说明。
          </p>
        </div>
        <div class="editor-topbar-actions">
          <a id="return-home" class="ghost button-link" href="./index.html">返回解析页</a>
          <section class="export-panel" aria-label="导出文件">
            <div class="export-panel-head">
              <strong>导出文件</strong>
              <span id="export-filename" class="export-filename">knowledge-network.docx</span>
            </div>
            <div class="export-panel-controls">
              <label class="export-field">
                <span>格式</span>
                <select id="export-format">
                  <option value="docx">Word</option>
                  <option value="pdf">PDF</option>
                  <option value="mm">MM</option>
                  <option value="png">图片</option>
                </select>
              </label>
              <button id="export-file" class="primary">开始导出</button>
            </div>
            <p id="export-status" class="export-status">Word 支持本地导出，其他格式通过后端导出接口生成。</p>
          </section>
        </div>
      </section>

      <section class="editor-grid">
        <aside class="panel editor-sidebar">
          <div class="panel-head">
            <h2>目录总览</h2>
            <span id="node-count" class="badge">0 个节点</span>
          </div>
          <div id="outline-tree" class="tree empty">还没有可编辑的目录结构。</div>
        </aside>

        <section class="editor-main">
          <article class="panel network-panel">
            <div class="panel-head">
              <h2>关系视图</h2>
              <span id="focus-label" class="badge">未选择节点</span>
            </div>
            <div id="network-canvas" class="network-canvas empty">
              请先从左侧目录中选择一个节点。
            </div>
            <div id="network-meta" class="network-meta empty">当前会显示所选节点的上级与下级关系。</div>
          </article>

          <article class="panel inspector-panel">
            <div class="panel-head">
              <h2>节点编辑</h2>
              <span id="selection-path" class="badge">暂无路径</span>
            </div>

            <div class="form-stack">
              <label class="field">
                <span>节点标题</span>
                <input id="node-title" type="text" placeholder="输入节点标题" />
              </label>

              <label class="field">
                <span>节点说明文本</span>
                <textarea id="node-note" rows="8" placeholder="为当前节点补充说明、内容摘要或备注。"></textarea>
              </label>

              <div class="actions wrap">
                <button id="save-node" class="primary">保存当前节点</button>
                <button id="add-child" class="ghost">新增子节点</button>
                <button id="add-sibling" class="ghost">新增同级节点</button>
                <button id="delete-node" class="ghost danger">删除当前节点</button>
              </div>
            </div>
          </article>
        </section>
      </section>
    </main>

    <script src="./editor.js"></script>
  </body>
</html>
