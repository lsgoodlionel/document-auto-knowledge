<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户菜单 | 文档自动知识库系统</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-app-page="user">
    <script src="./common-auth.js"></script>
    <script src="./auth-gate.js"></script>
    <script src="./common-nav.js"></script>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">ACCOUNT CENTER</p>
        <h1>用户菜单</h1>
        <p class="intro">查看当前登录身份、会话状态和常用入口，在这里继续进入首页、知识网络或退出系统。</p>
      </section>

      <section class="auth-stage">
        <article class="auth-story panel">
          <div class="auth-story-copy">
            <p class="eyebrow">SESSION</p>
            <h2>本地账户与工作入口</h2>
            <p class="section-note">当前版本是本地单用户模式，适合作为个人知识库、研究资料库和项目整理工作台。</p>
          </div>
          <div class="auth-story-grid" aria-label="账户页说明">
            <div class="auth-story-card">
              <strong>账户状态</strong>
              <span>查看当前用户名、显示名和会话有效性。</span>
            </div>
            <div class="auth-story-card">
              <strong>快捷入口</strong>
              <span>可直接前往首页、知识网络和登录页。</span>
            </div>
            <div class="auth-story-card auth-story-card-accent">
              <strong>安全退出</strong>
              <span>退出后再次访问首页和知识网络都会被要求重新登录。</span>
            </div>
          </div>
        </article>

        <section id="user-app" class="panel auth-panel">
          <p class="status">正在加载用户菜单。</p>
        </section>
      </section>
    </main>

    <script src="./user.js"></script>
  </body>
</html>
