<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word 文档目录生成器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">WORD TO FOLDER SYSTEM</p>
        <h1>把 Word 标题结构变成可执行的文件夹系统</h1>
        <p class="intro">
          上传 `.docx` 文档后，网页会按 Word 的标题样式或大纲级别生成目录树，适合课程资料、项目归档、招投标文档和知识库初始化。
        </p>
      </section>

      <section class="panel uploader">
        <label class="dropzone" for="docx-input">
          <input id="docx-input" type="file" accept=".docx" />
          <span class="drop-title">选择一个 `.docx` 文件</span>
          <span class="drop-hint">支持按“标题 1 / 标题 2 / 标题 3 ...”或“段落大纲级别”生成层级目录</span>
        </label>
        <div class="actions">
          <button id="parse-btn" class="primary">开始解析</button>
          <button id="sample-btn" class="ghost">载入演示数据</button>
          <button id="download-zip" class="ghost" disabled>下载目录 zip</button>
          <button id="open-network" class="ghost" disabled>打开知识网络</button>
        </div>
        <p id="status" class="status">等待上传文档。</p>
      </section>

      <section class="panel projects-panel">
        <div class="panel-head">
          <div>
            <h2>历史项目</h2>
            <p id="project-status" class="section-note">正在读取本机数据库中的项目。</p>
          </div>
          <button id="refresh-projects" class="ghost tiny" type="button">刷新列表</button>
        </div>
        <div id="project-list" class="project-list empty">正在加载历史项目。</div>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel-head">
            <h2>目录预览</h2>
            <span id="count-badge" class="badge">0 个目录</span>
          </div>
          <div id="tree-view" class="tree empty">解析后会在这里显示目录结构。</div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>识别到的标题</h2>
          </div>
          <div id="heading-list" class="headings empty">还没有识别到任何标题。</div>
        </article>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel-head">
            <h2>Bash 创建脚本</h2>
            <button id="download-bash" class="ghost tiny" disabled>下载 .sh</button>
          </div>
          <pre id="bash-script" class="code-block empty">暂无内容</pre>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>PowerShell 创建脚本</h2>
            <button id="download-pwsh" class="ghost tiny" disabled>下载 .ps1</button>
          </div>
          <pre id="pwsh-script" class="code-block empty">暂无内容</pre>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
